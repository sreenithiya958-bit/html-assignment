<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> flexbox </title>
</head>
<style>
    .container{
        border: 2px solid black;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        height: 300px;
        width: 600px;
        background-color: blueviolet;
        gap: 20px;
    }
    .BOX{
        border: 2px solid black;
        width: 200px;
        height: 150px;
        margin: 20px;
        background-color: bisque;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 2px 2px 5px ;
        font-weight: bold;
        }
</style>
<body>
    <div class="container">
        <p class="BOX"> BOX </p>
        <p class="BOX"> BOX </p>
        <p class="BOX"> BOX </p>
    </div>
</body>
</html>
