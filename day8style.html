<!doctype html>
<html>
    <head>
        <title> style in css </title>
    </head>
    <style>
        .box{
            border: 1px solid brown;
            padding: 16px;
        }
        p{
            color: #555;
            line-height: 1.6;
        }
        .intro{
            font-style: italic;
        }
        .highlight{
            background-color: #f0f8ff;
            padding: 8px;
        }
        #header{
            color: #2c3e50;
            font-size: 32px;
        }
    </style>
    <body>
        <h1 id="header"> wellcome all </h1>
        <div class="box">
        <p> this is paragraph about css </p>
        <p class="intro"> lets see detail about css </p>
        <p class="highlight"> css is used for styling </p>
        
    </body>
</html>
